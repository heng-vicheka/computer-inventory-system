pre-commit:
  parallel: true
  commands:
    # prettier
    prettier:
      run: pnpm lint:prettier

    # eslint
    eslint:
      run: pnpm lint

    #cspell
    cspell:
      run: pnpm lint:spell

    # audit
    audit:
      run: pnpm audit --audit-level=low

