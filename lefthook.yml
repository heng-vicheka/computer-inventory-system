pre-commit:
  parallel: true
  commands:
    # prettier
    prettier:
      run: npm run lint:prettier

    # eslint
    eslint:
      run: npm run lint

    #cspell
    cspell:
      run: npm run lint:spell

    # audit
    audit:
      run: npm audit --audit-level=critical

pre-push:
  commands:
    packages audit:
      run: npm audit --audit-level=critical
